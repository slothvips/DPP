<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据差异对比工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      padding: 20px;
      background-color: #f5f5f5;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 24px;
    }
    h1 {
      margin-bottom: 20px;
      color: #333;
      border-bottom: 2px solid #1890ff;
      padding-bottom: 10px;
    }
    .description {
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .input-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
    }
    .input-group label {
      font-weight: bold;
      margin-bottom: 8px;
      color: #333;
    }
    .input-group textarea {
      width: 100%;
      min-height: 400px;
      padding: 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 12px;
      resize: vertical;
    }
    .input-group textarea:focus {
      outline: none;
      border-color: #1890ff;
      box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
    }
    .button-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background-color: #1890ff;
      color: white;
    }
    .btn-primary:hover {
      background-color: #40a9ff;
    }
    .btn-secondary {
      background-color: #f5f5f5;
      color: #333;
      border: 1px solid #d9d9d9;
    }
    .btn-secondary:hover {
      background-color: #e6e6e6;
    }
    .error {
      background-color: #fff1f0;
      color: #ff4d4f;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      border: 1px solid #ffccc7;
    }
    .result-container {
      display: none;
    }
    .result-container.active {
      display: block;
    }
    .filter-controls {
      margin-bottom: 16px;
      padding: 12px;
      background: #fafafa;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .filter-controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .filter-controls input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .copy-button {
      padding: 8px 16px;
      background-color: #1890ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.3s;
    }
    .copy-button:hover {
      background-color: #40a9ff;
    }
    .copy-button.success {
      background-color: #52c41a;
    }
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      padding: 16px;
      background: #fafafa;
      border-radius: 4px;
      flex-wrap: wrap;
    }
    .stat-item {
      padding: 8px 16px;
      border-radius: 4px;
      font-weight: bold;
    }
    .stat-insert {
      background-color: #f6ffed;
      color: #52c41a;
      border: 1px solid #b7eb8f;
    }
    .stat-remove {
      background-color: #fff1f0;
      color: #ff4d4f;
      border: 1px solid #ffccc7;
    }
    .stat-update {
      background-color: #e6f7ff;
      color: #1890ff;
      border: 1px solid #91d5ff;
    }
    .stat-total {
      background-color: #fafafa;
      color: #666;
      border: 1px solid #d9d9d9;
    }
    .tree-container {
      margin-top: 20px;
    }
    .tree-node {
      margin: 4px 0;
      transition: background-color 0.2s;
    }
    .tree-node:hover {
      background-color: #f5f5f5;
    }
    .tree-node.hidden {
      display: none;
    }
    .node-content {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .node-name {
      font-weight: 500;
    }
    .node-id {
      color: #999;
      font-size: 12px;
    }
    .node-fields {
      color: #666;
      font-size: 12px;
    }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      background-color: #52c41a;
      color: white;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.3s;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .back-button {
      margin-bottom: 16px;
    }
    .back-button .btn {
      padding: 8px 16px;
      font-size: 14px;
    }
    .diff-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .diff-modal.hidden {
      display: none;
    }
    .diff-modal-content {
      background: white;
      border-radius: 8px;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      overflow: auto;
      padding: 24px;
    }
    .diff-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .diff-modal-header h3 {
      margin: 0;
      color: #333;
    }
    .diff-modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
    .diff-modal-close:hover {
      color: #333;
    }
    .diff-field {
      margin-bottom: 16px;
      padding: 8px 12px;
      border-radius: 4px;
      background: #fafafa;
    }
    .diff-field-name {
      font-weight: bold;
      color: #333;
      margin-bottom: 4px;
    }
    .diff-field-values {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .diff-field-old {
      background: #fff1f0;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ffccc7;
    }
    .diff-field-new {
      background: #f6ffed;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #b7eb8f;
    }
    .diff-field-label {
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .diff-field-old .diff-field-label { color: #ff4d4f; }
    .diff-field-new .diff-field-label { color: #52c41a; }
    .diff-field-value {
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container" id="inputPage">
    <h1>数据差异对比工具</h1>
    <div class="description">
      输入两组树形/扁平数据，自动检测层级关系并对比差异。支持任意树形结构。
    </div>
    <form id="diffForm">
      <div class="input-section">
        <div class="input-group">
          <label for="dataA">数据源 A - JSON</label>
          <textarea id="dataA" placeholder='扁平数据: [{"id":"1","name":"节点1","pid":"0",...}]&#10;&#10;树形数据: [{"id":"1","name":"节点1","children":[...]}]'></textarea>
        </div>
        <div class="input-group">
          <label for="dataB">数据源 B - JSON</label>
          <textarea id="dataB" placeholder='扁平数据: [{"id":"1","name":"节点1","pid":"0",...}]&#10;&#10;树形数据: [{"id":"1","name":"节点1","children":[...]}]'></textarea>
        </div>
      </div>
      <div class="button-group">
        <button type="submit" class="btn btn-primary">开始对比</button>
        <button type="button" class="btn btn-secondary" onclick="clearInputs()">清空</button>
      </div>
    </form>
    <div id="error" class="error" style="display: none;"></div>
  </div>

  <div class="container result-container" id="resultPage">
    <div class="back-button">
      <button class="btn btn-secondary" onclick="showInputPage()">返回输入</button>
    </div>
    <h1>差异对比结果</h1>
    <div class="description">
      完整展示数据层级结构，差异项已用标签标记。
    </div>
    <div class="filter-controls">
      <label>
        <input type="checkbox" id="showDiffOnly">
        <span>仅显示差异项</span>
      </label>
      <button id="copyBtn" class="copy-button" onclick="copyDiffResult()">
        📋 一键复制差异项
      </button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="tree-container" id="treeContainer"></div>
  </div>

  <div id="toast" class="toast"></div>

  <div id="diffModal" class="diff-modal hidden">
    <div class="diff-modal-content">
      <div class="diff-modal-header">
        <h3>变更详情</h3>
        <button class="diff-modal-close" onclick="closeDiffModal()">&times;</button>
      </div>
      <div style="background:#e6f7ff;padding:12px;border-radius:4px;margin-bottom:16px;font-size:13px;color:#1890ff;">
        💡 <strong>填写提示：</strong>通常需要将 <strong>B 数据源（新值）</strong> 填写到对应系统中
      </div>
      <div id="diffModalBody"></div>
    </div>
  </div>

  <script>
    // ========== 字段自动检测 ==========

    const ID_PATTERNS = ['id', 'menuId', 'key', 'uid', 'code'];
    const NAME_PATTERNS = ['name', 'menuName', 'label', 'title', 'text'];
    const PID_PATTERNS = ['pid', 'parentId', 'parent_id', 'parent', 'parentKey', 'pId'];
    const CHILDREN_PATTERNS = ['children', 'childs', 'nodes', 'items'];
    const SORT_PATTERNS = ['sort', 'sortNo', 'sortno', 'order', 'seq', 'index'];

    function detectField(data, patterns) {
      if (!data || !Array.isArray(data) || data.length === 0) return null;
      const sample = data[0];
      if (typeof sample !== 'object') return null;

      for (const pattern of patterns) {
        if (sample.hasOwnProperty(pattern)) return pattern;
      }
      return null;
    }

    function detectFields(data) {
      return {
        idField: detectField(data, ID_PATTERNS) || 'id',
        nameField: detectField(data, NAME_PATTERNS) || 'name',
        pidField: detectField(data, PID_PATTERNS) || 'pid',
        childrenField: detectField(data, CHILDREN_PATTERNS) || 'children',
        sortField: detectField(data, SORT_PATTERNS) || 'sortNo'
      };
    }

    // ========== 数据格式转换 ==========

    function isTreeData(data, childrenField) {
      if (!Array.isArray(data) || data.length === 0) return false;
      return data.some(item => item[childrenField] && Array.isArray(item[childrenField]));
    }

    function flattenTreeData(treeData, childrenField) {
      const result = [];

      function traverse(nodes) {
        nodes.forEach(node => {
          const children = node[childrenField];
          const nodeData = { ...node };
          delete nodeData[childrenField];
          result.push(nodeData);
          if (children && Array.isArray(children) && children.length > 0) {
            traverse(children);
          }
        });
      }

      traverse(treeData);
      return result;
    }

    function parseData(jsonText, childrenField) {
      const parsed = JSON.parse(jsonText);
      if (isTreeData(parsed, childrenField)) {
        return flattenTreeData(parsed, childrenField);
      }
      return parsed;
    }

    // ========== 差异对比 ==========

    function isEqual(obj1, obj2) {
      if (obj1 === obj2) return true;
      if (obj1 == null || obj2 == null) return obj1 === obj2;
      if (typeof obj1 !== 'object' || typeof obj2 !== 'object') return obj1 === obj2;

      const keys1 = Object.keys(obj1);
      const keys2 = Object.keys(obj2);

      if (keys1.length !== keys2.length) return false;

      for (const key of keys1) {
        if (!keys2.includes(key)) return false;
        if (!isEqual(obj1[key], obj2[key])) return false;
      }

      return true;
    }

    function computeDiff(dataA, dataB, fields) {
      const { idField, pidField } = fields;
      const diffResult = [];

      const mapA = new Map();
      dataA.forEach(item => mapA.set(item[idField], item));

      const mapB = new Map();
      dataB.forEach(item => mapB.set(item[idField], item));

      // 找出删除和更新的
      dataB.forEach(itemB => {
        const itemA = mapA.get(itemB[idField]);
        if (!itemA) {
          diffResult.push({ ...itemB, type: 'remove' });
        } else if (!isEqual(itemA, itemB)) {
          diffResult.push({ ...itemB, type: 'update' });
        }
      });

      // 找出新增的
      dataA.forEach(itemA => {
        if (!mapB.has(itemA[idField])) {
          diffResult.push({ ...itemA, type: 'insert' });
        }
      });

      return diffResult;
    }

    function processDiff(dataA, dataB, fields) {
      const diffResult = computeDiff(dataA, dataB, fields);
      const { idField } = fields;

      const diffMap = new Map();
      diffResult.forEach(item => diffMap.set(item[idField], item.type));

      const dataBIds = new Set(dataB.map(m => m[idField]));
      const allData = [...dataB];
      dataA.forEach(item => {
        if (!dataBIds.has(item[idField])) {
          allData.push(item);
        }
      });

      return { diffResult, diffMap, allData };
    }

    // ========== 树构建 ==========

    function buildTree(data, fields, diffMap) {
      const { idField, pidField, sortField, childrenField } = fields;

      const nodeMap = new Map();
      const rootNodes = [];

      data.forEach(item => {
        const node = {
          ...item,
          _id: item[idField],
          _pid: item[pidField] || 'root',
          _sort: item[sortField] || 0,
          _children: [],
          _diffType: diffMap.get(item[idField]) || null
        };
        nodeMap.set(item[idField], node);
      });

      data.forEach(item => {
        const node = nodeMap.get(item[idField]);
        const pid = item[pidField] || 'root';

        if (pid === 'root' || !nodeMap.has(pid)) {
          rootNodes.push(node);
        } else {
          nodeMap.get(pid)._children.push(node);
        }
      });

      function sortChildren(node) {
        if (node._children.length > 0) {
          node._children.sort((a, b) => (a._sort || 0) - (b._sort || 0));
          node._children.forEach(sortChildren);
        }
      }

      rootNodes.sort((a, b) => (a._sort || 0) - (b._sort || 0));
      rootNodes.forEach(sortChildren);

      return rootNodes;
    }

    // ========== 渲染 ==========

    function getDiffInfo(type) {
      switch (type) {
        case 'insert': return { text: '新增', color: '#52c41a' };
        case 'remove': return { text: '删除', color: '#ff4d4f' };
        case 'update': return { text: '更新', color: '#1890ff' };
      }
    }

    function hasDiff(node) {
      if (node._diffType) return true;
      return node._children.some(child => hasDiff(child));
    }

    function renderNode(node, level, fields) {
      const { idField, nameField } = fields;
      const indent = level * 20;
      const hasChildren = node._children.length > 0;
      const diffInfo = node._diffType ? getDiffInfo(node._diffType) : null;
      const borderColor = diffInfo ? diffInfo.color : '#e8e8e8';
      const nodeHasDiff = hasDiff(node);

      const diffBadge = diffInfo
        ? `<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold;background-color:${diffInfo.color};color:white;">${diffInfo.text}</span>`
        : '';

      const name = node[nameField] || node[idField] || '(无名称)';
      const id = node[idField];

      const otherFields = Object.entries(node)
        .filter(([k, v]) => !['_id', '_pid', '_sort', '_children', '_diffType', idField, nameField].includes(k) && v != null)
        .slice(0, 3)
        .map(([k, v]) => `<span style="color:#888;">${k}: ${String(v).slice(0, 20)}</span>`)
        .join(' ');

      const clickHandler = diffInfo && diffInfo.text === '更新'
        ? `onclick="showUpdateDetail('${id}')" style="cursor:pointer;"`
        : '';

      let html = `
        <div class="tree-node" data-has-diff="${nodeHasDiff}" data-id="${id}" ${clickHandler} style="margin-left:${indent}px;padding:4px 8px;border-left:2px solid ${borderColor};">
          <div class="node-content">
            ${diffBadge}
            <span class="node-name">${name}</span>
            <span class="node-id">(${id})</span>
            ${otherFields ? `<span class="node-fields">${otherFields}</span>` : ''}
            ${diffInfo && diffInfo.text === '更新' ? '<span style="color:#1890ff;font-size:12px;">点击查看详情</span>' : ''}
          </div>
        </div>
      `;

      if (hasChildren) {
        node._children.forEach(child => {
          html += renderNode(child, level + 1, fields);
        });
      }

      return html;
    }

    function showUpdateDetail(id) {
      const { idField } = currentFields;
      const itemA = currentDataA.find(item => item[idField] === id);
      const itemB = currentDataB.find(item => item[idField] === id);

      if (!itemA || !itemB) return;

      // 找出所有变化的字段
      const allKeys = new Set([...Object.keys(itemA), ...Object.keys(itemB)]);
      const changedFields = [];

      allKeys.forEach(key => {
        if (!isEqual(itemA[key], itemB[key])) {
          changedFields.push({
            key,
            oldVal: itemA[key],
            newVal: itemB[key]
          });
        }
      });

      const fieldsHtml = changedFields.map(f => `
        <div class="diff-field">
          <div class="diff-field-name">${f.key}</div>
          <div class="diff-field-values">
            <div class="diff-field-old">
              <div class="diff-field-label">A 数据源（旧值）</div>
              <div class="diff-field-value">${formatValue(f.oldVal)}</div>
            </div>
            <div class="diff-field-new">
              <div class="diff-field-label">B 数据源（新值）</div>
              <div class="diff-field-value">${formatValue(f.newVal)}</div>
            </div>
          </div>
        </div>
      `).join('');

      document.getElementById('diffModalBody').innerHTML = fieldsHtml || '<p>无变更详情</p>';
      document.getElementById('diffModal').classList.remove('hidden');
    }

    function formatValue(val) {
      if (val == null) return '<em>null</em>';
      if (typeof val === 'object') return JSON.stringify(val);
      return String(val);
    }

    function closeDiffModal() {
      document.getElementById('diffModal').classList.add('hidden');
    }

    document.getElementById('diffModal').addEventListener('click', function(e) {
      if (e.target === this) closeDiffModal();
    });

    // ========== UI ==========

    let currentDiffResult = [];
    let currentFields = null;
    let currentDataA = [];
    let currentDataB = [];

    function showInputPage() {
      document.getElementById('inputPage').style.display = 'block';
      document.getElementById('resultPage').classList.remove('active');
    }

    function showResultPage() {
      document.getElementById('inputPage').style.display = 'none';
      document.getElementById('resultPage').classList.add('active');
    }

    function clearInputs() {
      document.getElementById('dataA').value = '';
      document.getElementById('dataB').value = '';
      document.getElementById('error').style.display = 'none';
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    async function copyDiffResult() {
      try {
        await navigator.clipboard.writeText(JSON.stringify(currentDiffResult, null, 2));
        showToast('✅ 已复制到剪贴板');
        const btn = document.getElementById('copyBtn');
        btn.classList.add('success');
        btn.textContent = '✓ 已复制';
        setTimeout(() => {
          btn.classList.remove('success');
          btn.textContent = '📋 一键复制差异项';
        }, 2000);
      } catch {
        showToast('❌ 复制失败');
      }
    }

    function filterTree() {
      const checked = document.getElementById('showDiffOnly').checked;
      document.querySelectorAll('.tree-node').forEach(node => {
        node.classList.toggle('hidden', checked && node.dataset.hasDiff !== 'true');
      });
    }

    // ========== 表单提交 ==========

    document.getElementById('diffForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const textA = document.getElementById('dataA').value.trim();
      const textB = document.getElementById('dataB').value.trim();
      const errorDiv = document.getElementById('error');
      errorDiv.style.display = 'none';

      if (!textA || !textB) {
        errorDiv.textContent = '请填写两组数据';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        // 先解析判断 children 字段
        const tempA = JSON.parse(textA);
        const tempB = JSON.parse(textB);
        const sampleData = Array.isArray(tempA) ? tempA : tempB;
        const parsedSample = Array.isArray(sampleData) ? sampleData : [sampleData];

        // 找到 children 字段
        const childrenField = detectField(parsedSample, CHILDREN_PATTERNS) || 'children';

        const dataA = parseData(textA, childrenField);
        const dataB = parseData(textB, childrenField);

        currentDataA = dataA;
        currentDataB = dataB;

        currentFields = detectFields(dataA.length > 0 ? dataA : dataB);
        const { idField } = currentFields;

        const { diffResult, diffMap, allData } = processDiff(dataA, dataB, currentFields);
        currentDiffResult = diffResult;

        const tree = buildTree(allData, currentFields, diffMap);

        const insertCount = diffResult.filter(r => r.type === 'insert').length;
        const removeCount = diffResult.filter(r => r.type === 'remove').length;
        const updateCount = diffResult.filter(r => r.type === 'update').length;

        document.getElementById('stats').innerHTML = `
          <div class="stat-item stat-insert">新增: ${insertCount}</div>
          <div class="stat-item stat-remove">删除: ${removeCount}</div>
          <div class="stat-item stat-update">更新: ${updateCount}</div>
          <div class="stat-item stat-total">显示节点: ${allData.length}</div>
        `;

        document.getElementById('treeContainer').innerHTML = tree
          .map(node => renderNode(node, 0, currentFields))
          .join('');

        document.getElementById('showDiffOnly').checked = false;
        showResultPage();
      } catch (err) {
        errorDiv.textContent = '处理失败: ' + err.message;
        errorDiv.style.display = 'block';
      }
    });

    document.getElementById('showDiffOnly').addEventListener('change', filterTree);
  </script>
</body>
</html>
