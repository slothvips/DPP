<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DPP AI Assistant</title>
    <script>
      // Apply theme immediately before React loads to prevent flash
      (function () {
        // Check localStorage first (sync)
        var theme = localStorage.getItem('theme');
        if (
          theme === 'dark' ||
          (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* 全局隐藏滚动条 / Hide all scrollbars globally */
      ::-webkit-scrollbar {
        display: none;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        scrollbar-width: none; /* Firefox */
        width: 100%;
        height: 100%;
        min-height: 0;
        min-width: 0;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      /*
       * 侧栏/小窗的实际高度由宿主决定，不能用 100vh/100dvh 撑高文档，
       * 否则布局会按整页视口计算，底部在宿主窗口内被裁切且无法滚动。
       */
      #root {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        min-height: 0;
        min-width: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
