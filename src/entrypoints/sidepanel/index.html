<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DPP AI Assistant</title>
    <script>
      // Apply theme immediately before React loads to prevent flash
      (function () {
        // Check localStorage first (sync)
        var theme = localStorage.getItem('theme');
        if (
          theme === 'dark' ||
          (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* 全局隐藏滚动条 / Hide all scrollbars globally */
      ::-webkit-scrollbar {
        display: none;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scrollbar-width: none; /* Firefox */
        height: 100%;
        min-height: 100%;
      }

      body {
        width: 100%;
        min-width: 0;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        /* 回退：不支持 dvh 的浏览器仍可用 vh */
        min-height: 100vh;
        min-height: 100dvh;
      }
      #root {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        min-width: 0;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
